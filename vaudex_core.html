  <style>
    :root {
      font-family: "Poppins", sans-serif;
    }

    .material-symbols-outlined {
      font-variation-settings:

        'wght' 400,
        'GRAD' 0,
        'opsz' 48

    body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      max-width: 99vw;
      max-height: 99vh;
      overflow-y: auto;
      overflow-x: hidden;
      --dynamic-height-padding: calc(85px + 1.1vw);
      --primary-inverse: #eaeaea !important;
      --primary: hsl(195deg 100% 27.93%) !important;
    }

    .material-symbols-outlined {
      font-size: 32px;
    }

    ::placeholder {
      color: #b3b1b1 !important;
    }

    [data-theme="light"] {
      --item-border-color: rgb(205 205 205);
      --info-panel-background-color: rgba(230, 230, 230, 0.9);
      --muted-color: #e3e3e3 !important;
      --muted-border-color: hsl(205deg 5.84% 84.79%) !important;
      --table-border-color: hsl(205deg 5.84% 84.79%);
      --background-color: #f7f7f7 !important;
      --section-div-color: rgba(241, 241, 241, 0.8);
      --loading-screen-background-color: rgba(200, 200, 200, 0.9);
      --modal-screen-background-color: white;
      --anchor-element-blender-color: rgba(242, 242, 242, 0);
      --loading-screen-text-color: black;
      --scroll-fade-color: linear-gradient(to top, rgba(251, 251, 251, 1) 0%, rgba(251, 251, 251, 0) 100%);

      --action-button-color: var(--pico-primary);
      --sidenav-background-color: #f7f7f7 !important;
    }

    [data-theme="dark"] {
      --muted-color: hsl(205deg 6.6% 16.2%);
      --item-border-color: rgb(140 140 140 / 21%);
      --h2-color: hsl(205, 20%, 94%);
      --h3-color: hsl(205, 20%, 94%);
      --h4-color: hsl(205, 20%, 94%);
      --h5-color: hsl(205, 20%, 94%);
      --form-element-color: hsl(205, 20%, 94%);
      --form-element-placeholder-color: hsl(205, 20%, 94%);
      --info-panel-background-color: rgb(50 50 50 / 50%);
      --section-div-color: rgb(50 50 50 / 15%);
      --modal-screen-background-color: rgba(40, 50, 50, 0.9);
      --anchor-element-blender-color: rgba(50, 50, 50, 0);
      --loading-screen-background-color: rgba(30, 30, 30, 0.9);
      --loading-screen-text-color: white;
      --scroll-fade-color: linear-gradient(to top, var(--background-color) 0%, rgba(25, 25, 25, 0) 100%);
      --action-button-background-color: rgb(23 31 37 / 90%);
      --calendar-header-color: #676767;
      --homepage-item-color: #1d2224;
      --fab-background-color: rgb(231 220 220 / 13%);
      --item-box-shadow: 6px 6px 8px 0px rgb(22 32 56 / 38%);
      --action-button-color: #00adff;
      --background-color: #18171766 !important;
      --sidenav-background-color: #141414 !important;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
      background: var(--action-button-background-color);
    }

    ::-webkit-scrollbar-thumb {
      background: rgb(71, 68, 68);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    .info-panel {
      background-color: var(--info-panel-background-color);
      padding: 1px 10px 12px 10px;
      border-radius: 10px;
      text-align: left;
    }

    .info-panel i {
      position: relative;
      top: 9px;
      margin-right: 5px;
      font-size: 32px;
    }

    .info-panel p {
      margin-bottom: 0px;
    }

    a {
      text-decoration: none;
      background-color: transparent;
    }

    #main-content-div {
      opacity: 1;
      transition: opacity 0.3s ease-in-out;
    }

    async function createSignupPage() {
      let createSignupHTML = `
        <style>              
          h2, p {
            text-align: center;            
            width: 90vw;
            max-width: 500px;
            margin: auto;
            margin-bottom: 10px; 
          }

            padding: 7px;
          }

            text-align: center;
          }
          #signup-content-div {         
            box-sizing: border-box;
            max-width: 500px;
            height: 80vh;
            width: 90vw; 
            margin: auto;
            overflow-y: auto;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: var(--dynamic-padding);
          } 
        </style>
        <h2>Create Account</h2>   
        <p>Creating a VauDex account only takes a few seconds. Make sure to use a <b>strong password!</b></p>    
        <div id="signup-content-div">         
          <label for="username-field">
            Nickname
            <input type="text" id="username-field" name="username-field" placeholder="User Name" required>
          </label>
          <label for="password-field">
            Password
            <input type="password" id="password-field" name="password-field" placeholder="Password" required>
          </label>
          <label for="password-confirm-field">
            Confirm Password
            <input type="password" id="password-confirm-field" name="password-confirm-field" placeholder="Password" required>
          </label>
          <label for="terms">
            <input type="checkbox" id="terms" name="terms">
              I read and agreed to the Terms and Conditions
          </label>
          <div id="button-div" class="grid">
            <a id="back-button" class="button" href="#" role="button">Back</a>
            <a id="next-button" class="button" href="#" role="button">Create</a>          
          </div>
        </div>
        `
      mainLayout.innerHTML = createSignupHTML;
      var usernameField = document.querySelector("#username-field");
      var passwordField = document.querySelector("#password-field");
      var passwordConfirmField = document.querySelector("#password-confirm-field");
      var nextButton = document.querySelector("#next-button");
      var backButton = document.getElementById("back-button");
      backButton.addEventListener("click", function () {
        createLoginPage();
      });

      nextButton.addEventListener("click", async function () {
        password = passwordField.value;
        var termsCheckbox = document.querySelector("#terms");
        if (!termsCheckbox.checked) {
          showGenericToast("Must accept terms!");
          return;
        }
        var nickname = usernameField.value.trim();
        if (nickname === "") {
          showGenericToast("Nickname cannot be empty");
          return;
        }
        var passwordConfirm = passwordConfirmField.value;
        if (password != passwordConfirm) {
          showGenericToast("Passwords do not match!");
          return;
        }
        configDB["userName"] = usernameField.value;
        configDB["lightTheme"] = 'light';
        configDB["pbdkf2Iters"] = defaultPbkdf2Iterations;
        await createAuthToken();
        await saveConfig();
        await loadDB();
        navbarLayout.innerHTML = null;
        createLoginPage();
        showGenericToast("Account created!");
      });
    }

      function createTodayEvents(name, config) {
        var selectedDay = "Today";

          selectedDay = "Tomorrow"
        }
        var eventItem = document.createElement("p");
        eventItem.className = "homepage-task-item";

        if (config["timeType"] == "specific") {
          var formattedTime = convertTo12HourFormat(config["time"]);

        }

        eventItem.appendChild(boldElement);

        eventItem.appendChild(breakElement);
        var nameTextNode = document.createTextNode(name);
        eventItem.appendChild(nameTextNode);
        todayEventListDiv.appendChild(eventItem);
      }

      function getDaysEvents() {
        var dayLookupTable = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        var dateObj = {};
        var currentDate = new Date();
        var modifiedDate = new Date();
        modifiedDate.setDate(currentDate.getDate() + dayOffset);
        dateObj["year"] = modifiedDate.getFullYear();
        dateObj["month"] = modifiedDate.getMonth() + 1;
        dateObj["day"] = modifiedDate.getDate();
        dateObj["dayOfWeek"] = modifiedDate.getDay();
        dateObj["month"] = dateObj["month"] < 10 ? '0' + dateObj["month"] : dateObj["month"];
        dateObj["day"] = dateObj["day"] < 10 ? '0' + dateObj["day"] : dateObj["day"];
        var currentDateString = dateObj["month"] + "/" + dateObj["day"] + "/" + dateObj["year"];
        var calendarDB = collectionsDB["_calendar"];
        var dailyAppointments = [];
        var allDayAppointments = [];
        var weeklyMatcher = "Every " + dayLookupTable[dateObj["dayOfWeek"]];
        var monthlyMatcher = dateObj["day"].toString();
        var yearlyMatcher = dateObj["month"].toString() + dateObj["day"].toString();
        numberOfEvents = 0;

        for (var item in calendarDB) {
          var appointment = calendarDB[item];
          if (appointment["reoccurType"] === "Every Day" && appointment["timeType"] === "specific") {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Every Day" && appointment["timeType"] === "allDay") {
            allDayAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Weekly" && appointment["reoccurDay"] === weeklyMatcher &&
            appointment["timeType"] === "specific") {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Weekly" && appointment["reoccurDay"] === weeklyMatcher &&
            appointment["timeType"] === "allDay") {
            allDayAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Monthly" && appointment["reoccurDay"] === monthlyMatcher &&
            appointment["timeType"] === "allDay") {
            allDayAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Monthly" && appointment["reoccurDay"] === monthlyMatcher &&
            appointment["timeType"] === "specific") {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Yearly" && appointment["reoccurDate"] === yearlyMatcher &&
            appointment["timeType"] === "allDay") {
            allDayAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Yearly" && appointment["reoccurDate"] === yearlyMatcher &&
            appointment["timeType"] === "specific") {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "oneTime" && appointment["timeType"] === "specific" && appointment["date"] === currentDateString) {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "oneTime" && appointment["timeType"] === "allDay" && appointment["date"] === currentDateString) {
            allDayAppointments.push({ name: item, config: appointment });
          }
        }
        dailyAppointments.sort(function (a, b) {
          return timeToMinutes(a.config["time"]) - timeToMinutes(b.config["time"]);
        });
        allDayAppointments.forEach(function (appointment) {
          createTodayEvents(appointment.name, appointment.config);
        });
        dailyAppointments.forEach(function (appointment) {
          createTodayEvents(appointment.name, appointment.config);
        });
        if (numberOfEvents == 0) {
          var noEventsText = document.createElement("p");
          noEventsText.className = "no-events-text";
          if (dayOffset == 0) {
            noEventsText.innerText = "Nothing scheduled today";
          } else {
            noEventsText.innerText = "Nothing scheduled tommorow";
          }

          todayEventListDiv.appendChild(noEventsText);
        }
      }

      function getUpcomingTasks() {
        var upcomingTaskListDiv = document.getElementById("upcoming-task-list-div");

        var sortedTasks = Object.keys(taskListRef)
          .filter(todo => taskListRef[todo]["status"] === "toDo")

            name: todo,
            dueDate: new Date(taskListRef[todo]["dueDate"])

          .sort((a, b) => a.dueDate - b.dueDate);

        sortedTasks.forEach(task => {
          var taskItem = document.createElement("p");
          taskItem.className = "homepage-task-item";
          var boldElement = document.createElement("b");
          let formattedDate = task.dueDate.toLocaleDateString("en-US");
          var dueByTextNode = document.createTextNode("Due by: " + formattedDate);
          boldElement.appendChild(dueByTextNode);
          taskItem.appendChild(boldElement);
          var breakElement = document.createElement("br");
          taskItem.appendChild(breakElement);
          var nameTextNode = document.createTextNode(task.name);
          taskItem.appendChild(nameTextNode);
          upcomingTaskListDiv.appendChild(taskItem);
        });
        if (sortedTasks.length === 0) {
          var noEventsText = document.createElement("p");
          noEventsText.className = "no-events-text";
          noEventsText.innerText = "No upcoming tasks";
          upcomingTaskListDiv.appendChild(noEventsText);

        changeMenuAnimation(createToDoListPage);

      goToTodayButton.addEventListener("click", function () {
        calendarDayOffset = 0;
        changeMenuAnimation(createCalendarDaySliderPage);

      async function updateEncryptionSettings() {

          showGenericToast("No changes!");

      const createNewAgendaButton = document.querySelector("#add-agenda-button");

      const calendarInnerContainer = document.getElementById('calendar-inner-container');

      monthYearHeader.innerText = monthLookup[actualCurrentMonth] + " " + actualCurrentYear;

      function drawCalendar(year, month) {
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let calendarHtml = '<table><tr>';
        const shortDaysOfWeek = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
        const longDaysOfWeek = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        calendarHtml += '<tr class="weekdays-header">';
        for (let i = 0; i < shortDaysOfWeek.length; i++) {
          calendarHtml += `
               <th>
                 <span class="short-day">${shortDaysOfWeek[i]}</span>
                 <span class="long-day">${longDaysOfWeek[i]}</span>
               </th>`;
        }
        calendarHtml += '</tr><tr>';
        for (let i = 0; i < firstDay; i++) {
          calendarHtml += '<td></td>';
        }
        let dayCounter = firstDay;
        for (let i = 1; i <= daysInMonth; i++) {
          if (i === actualCurrentDay && year === actualCurrentYear && month === actualCurrentMonth) {
            calendarHtml += `<td class="current-day" data-day="${i}">${i}</td>`;
          } else {
            calendarHtml += `<td data-day="${i}">${i}</td>`;
          }
          dayCounter++;
          if (dayCounter % 7 === 0 && i !== daysInMonth) {
            calendarHtml += '</tr><tr>';
          }
        }
        while (dayCounter % 7 !== 0) {
          calendarHtml += '<td></td>';
          dayCounter++;
        }
        calendarHtml += '</tr></table>';
        calendarInnerContainer.innerHTML = calendarHtml;

        function onDayClick(event) {
          const selectedDay = parseInt(event.target.getAttribute('data-day'));
          const now = new Date();
          const selectedDate = new Date(currentYear, currentMonth, selectedDay);
          const timeDiff = selectedDate - now;
          calendarDayOffset = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
          createCalendarDaySliderPage();
          return;
        }
        const days = document.querySelectorAll('td[data-day]');
        days.forEach(day => {
          day.addEventListener('click', onDayClick);
        });
      }
      function goToNextMonth() {
        calendarInnerContainer.style.transition = 'transform 0.3s ease-out';
        calendarInnerContainer.style.transform = 'translateX(-100%)';
        setTimeout(() => {
          updateCalendarMonth(1);
          calendarInnerContainer.style.transition = 'none';
          calendarInnerContainer.style.transform = 'translateX(100%)';
          setTimeout(() => {
            calendarInnerContainer.style.transition = 'transform 0.3s ease-out';
            calendarInnerContainer.style.transform = 'translateX(0)';
          }, 50);
        }, 300)
      }
      function goToPreviousMonth() {
        calendarInnerContainer.style.transition = 'transform 0.3s ease-out';
        calendarInnerContainer.style.transform = 'translateX(100%)';
        setTimeout(() => {
          updateCalendarMonth(-1);
          calendarInnerContainer.style.transition = 'none';
          calendarInnerContainer.style.transform = 'translateX(-100%)';
          setTimeout(() => {
            calendarInnerContainer.style.transition = 'transform 0.3s ease-out';
            calendarInnerContainer.style.transform = 'translateX(0)';
          }, 50);
        }, 300);
      }
      function updateCalendarMonth(increment) {
        currentMonth += increment;
        if (currentMonth > 11) {
          currentMonth = 0;
          currentYear++;
        } else if (currentMonth < 0) {
          currentMonth = 11;
          currentYear--;
        }
        monthYearHeader.innerText = monthLookup[currentMonth] + " " + currentYear;
        drawCalendar(currentYear, currentMonth);
      }
      function handleGesture() {
        let touchDelta = touchendX - touchstartX;
        if (touchDelta > 100) {
          calendarInnerContainer.style.transition = 'transform 0.3s ease-out';
          goToPreviousMonth();
        } else if (touchDelta < -100) {
          calendarInnerContainer.style.transition = 'transform 0.3s ease-out';
          goToNextMonth();
        } else {
          calendarInnerContainer.style.transition = 'none';
          calendarInnerContainer.style.transform = 'translateX(0)';
        }
      }
      drawCalendar(currentYear, currentMonth);
      backMonthButton.addEventListener("click", function () {
        goToPreviousMonth();
      });
      forwardMonthButton.addEventListener("click", function () {
        goToNextMonth();
      });
      goHomeButton.addEventListener("click", function () {
        goHome();
      });
      monthSliderDiv.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
        calendarInnerContainer.style.transition = 'none';
      });
      monthSliderDiv.addEventListener('touchmove', e => {
        touchmoveX = e.changedTouches[0].screenX;
        let deltaX = touchmoveX - touchstartX;
        calendarInnerContainer.style.transform = `translateX(${deltaX}px)`;
      });
      monthSliderDiv.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        handleGesture();
      });
    }

      mainLayout.innerHTML = createCalendarDaySliderHTML;

      function calculateDateDifference(selectedDateString) {
        const currentDate = new Date();
        currentDate.setHours(0, 0, 0, 0);
        const selectedDate = new Date(selectedDateString);
        selectedDate.setHours(0, 0, 0, 0);
        const differenceInMilliseconds = selectedDate - currentDate;
        const differenceInDays = differenceInMilliseconds / (1000 * 3600 * 24);
        return differenceInDays;
      }

      function convertTo12HourFormat(time24) {
        var [hours, minutes] = time24.split(':').map(Number);
        var period = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12; // Converts '00' to '12'
        var formattedHours = hours < 10 ? '0' + hours : hours.toString();
        var formattedMinutes = minutes < 10 ? '0' + minutes : minutes.toString();
        return `${formattedHours}:${formattedMinutes} ${period}`;
      }

      function changeDay() {
        var currentDate = new Date();
        var modifiedDate = new Date();
        modifiedDate.setDate(currentDate.getDate() + dayCounter);
        dateObj["year"] = modifiedDate.getFullYear();
        dateObj["month"] = modifiedDate.getMonth() + 1;
        dateObj["day"] = modifiedDate.getDate();
        dateObj["dayOfWeek"] = modifiedDate.getDay();
        dateObj["month"] = dateObj["month"] < 10 ? '0' + dateObj["month"] : dateObj["month"];
        dateObj["day"] = dateObj["day"] < 10 ? '0' + dateObj["day"] : dateObj["day"];
        currentDateString = dateObj["month"] + "/" + dateObj["day"] + "/" + dateObj["year"];
        var formattedDateString = dayLookupTable[dateObj["dayOfWeek"]] + ", " + dateObj["month"] + "/" + dateObj["day"] + "/" + dateObj["year"];
        currentDayText.innerText = formattedDateString;
      }

      function createAgendaItem(name, config) {
        numAgendasDay += 1;
        let container = document.createElement("div");

        selectIcon.textContent = "check_box_outline_blank";

        let reoccurLabel = document.createElement("b");
        reoccurLabel.textContent = "Reoccurs: ";

        var reoccurChoice = config["reoccurType"];
        if (reoccurChoice == "oneTime") {
          reoccurChoice = "No";
        }
        if (reoccurChoice == "Weekly") {
          reoccurChoice = config["reoccurDay"];
        }
        let reoccurChoiceText = document.createTextNode(reoccurChoice);
        reoccurText.appendChild(reoccurChoiceText);
        reoccurText.className = "agenda-content-text";
        let timeText = document.createElement("p");
        let timeLabel = document.createElement("b");
        timeLabel.textContent = "Time: ";
        timeText.appendChild(timeLabel);
        let formattedTime = "All Day";
        if (config["timeType"] == "specific") {
          formattedTime = convertTo12HourFormat(config["time"]);
        }
        let formattedTimeText = document.createTextNode(formattedTime);
        timeText.appendChild(formattedTimeText);
        timeText.className = "agenda-content-text";
        let descriptionText = document.createElement("p");
        descriptionText.className = "agenda-content-text";
        let boldElement = document.createElement("b");
        boldElement.textContent = "Details: ";
        descriptionText.appendChild(boldElement);
        let descriptionTextNode = document.createTextNode(config["description"]);
        descriptionText.appendChild(descriptionTextNode);
        if (config["description"].length == 0) {
          descriptionText.innerHTML = "";
        }
        selectIconButton.appendChild(selectIcon);
        selectIconButton.addEventListener('click', function (event) {
          currentItemName = this.id;
          event.preventDefault();
          let icon = this.firstChild;
          if (previousIcon && previousIcon !== icon) {
            previousIcon.textContent = "check_box_outline_blank";
          }
          if (icon.textContent === "check_box_outline_blank") {
            icon.textContent = "check_box";

            isNavDisabled = true;
            createActionButtonBar(actionBarSelectConfig);
            createEditHeaderOverlay("Item selected");
            assignItemSelectListeners();

          } else {
            icon.textContent = "check_box_outline_blank";
            previousIcon = null;
            isNavDisabled = false;
            createActionButtonBar(actionBarViewConfig);
            assignItemViewListeners();
            deleteEditHeaderOverlay();
          }
        });
        container.appendChild(label);
        label.appendChild(selectIconButton);
        container.appendChild(timeText);
        container.appendChild(reoccurText);

      }

      function getDailyAgendas() {
        numAgendasDay = 0;
        var calendarDB = collectionsDB["_calendar"];
        var dailyAppointments = [];
        var allDayAppointments = [];
        var weeklyMatcher = "Every " + dayLookupTable[dateObj["dayOfWeek"]];
        var monthlyMatcher = dateObj["day"].toString();
        var yearlyMatcher = dateObj["month"].toString() + dateObj["day"].toString();
        for (var item in calendarDB) {
          var appointment = calendarDB[item];
          if (appointment["reoccurType"] === "Every Day" && appointment["timeType"] === "specific" && dayCounter >= 0) {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Every Day" && appointment["timeType"] === "allDay" && dayCounter >= 0) {
            allDayAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Weekly" && appointment["reoccurDay"] === weeklyMatcher &&
            appointment["timeType"] === "specific" && dayCounter >= 0) {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Weekly" && appointment["reoccurDay"] === weeklyMatcher &&
            appointment["timeType"] === "allDay" && dayCounter >= 0) {
            allDayAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Monthly" && appointment["reoccurDay"] === monthlyMatcher &&
            appointment["timeType"] === "allDay" && dayCounter >= 0) {
            allDayAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Monthly" && appointment["reoccurDay"] === monthlyMatcher &&
            appointment["timeType"] === "specific" && dayCounter >= 0) {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Yearly" && appointment["reoccurDate"] === yearlyMatcher &&
            appointment["timeType"] === "allDay" && dayCounter >= 0) {
            allDayAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "Yearly" && appointment["reoccurDate"] === yearlyMatcher &&
            appointment["timeType"] === "specific" && dayCounter >= 0) {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "oneTime" && appointment["timeType"] === "specific" && appointment["date"] === currentDateString) {
            dailyAppointments.push({ name: item, config: appointment });
          }
          if (appointment["reoccurType"] === "oneTime" && appointment["timeType"] === "allDay" && appointment["date"] === currentDateString) {
            allDayAppointments.push({ name: item, config: appointment });
          }
        }
        dailyAppointments.sort(function (a, b) {
          return timeToMinutes(a.config["time"]) - timeToMinutes(b.config["time"]);
        });
        allDayAppointments.forEach(function (appointment) {
          createAgendaItem(appointment.name, appointment.config);
        });
        dailyAppointments.forEach(function (appointment) {
          createAgendaItem(appointment.name, appointment.config);
        });
        if (numAgendasDay > 0) {
          document.getElementById("no-agenda-text").style.display = "none";
        }
        if (numAgendasDay == 0) {
          document.getElementById("no-agenda-text").style.display = "block";
        }
      }
      changeDay();
      getDailyAgendas();

      function assignItemViewListeners() {
        const goBackButton = document.querySelector('#go-back-button');

            return;

          dayCounter -= 1;
          calendarDayOffset = dayCounter;
          itemListDiv.innerHTML = null;
          changeDay();

        const deleteButton = document.querySelector("#delete-button");

        editButton.addEventListener("click", function () {

          if (itemType == "agenda") {
            createAddAgendaPage("edit", currentItemName);

        });
        deleteButton.addEventListener("click", function () {
          showModalScreen("Confirm deletion", "Do you want to delete '" + currentItemName + "'? This action cannot be undone", "Delete", "Cancel");
          const confirmDeleteButton = document.querySelector('#modal-action-yes-button');
          const cancelDeleteButton = document.querySelector('#modal-action-alt-button');
          confirmDeleteButton.addEventListener("click", function () {
            delete collectionsDB["_calendar"][currentItemName];

          cancelDeleteButton.addEventListener("click", function () {
            hideModalScreen();
          });

        });
        unselectButton.addEventListener("click", function () {
          document.getElementById(currentItemName).click();
        });
      }
      function handleGesture() {
        if (touchendX + 100 < touchstartX && isNavDisabled == false) {
          dayCounter += 1;
          calendarDayOffset = dayCounter;
          itemListDiv.innerHTML = null;
          changeDay();
          getDailyAgendas();
        }
        if (touchendX > touchstartX + 100 && isNavDisabled == false) {
          dayCounter -= 1;
          calendarDayOffset = dayCounter;
          itemListDiv.innerHTML = null;
          changeDay();
          getDailyAgendas();
        }
      }
      daySliderContainerDiv.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
      });
      daySliderContainerDiv.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        handleGesture();
      });
      assignItemViewListeners();
    }

          yearlyDayConfigField.value = parseInt(dayRaw, 10).toString();

        if (editObj["timeType"] == "specific") {

      var taskTextField = document.getElementById("add-task-field");
      var dateField = document.getElementById("date-field");
      cancelAddTaskButton.addEventListener("click", function () {
        createToDoListPage()
      });
      saveTaskButton.addEventListener("click", function () {
        if (textLengthValidator(taskTextField, 0, "Must add details!") == false) {
          return;
        }
        var rawDate = dateField.value;
        var parts = rawDate.split("-");
        var formattedDateString = parts[1] + '/' + parts[2] + '/' + parts[0];
        collectionsDB["_toDoList"][taskTextField.value] = { "type": "task", "status": "toDo", "dueDate": formattedDateString };
        if (mode == "edit" && taskTextField.value != editItem) {
          delete collectionsDB["_toDoList"][editItem];
        }
        createToDoListPage();
        showGenericToast("Task Added");
      });
      if (mode != "edit") {
        var currentDate = new Date();
        var modifiedDate = new Date();
        modifiedDate.setDate(currentDate.getDate() + 7);
        var modifiedYear = modifiedDate.getFullYear();
        var modifiedMonth = modifiedDate.getMonth() + 1;
        var modifiedDay = modifiedDate.getDate();
        modifiedMonth = modifiedMonth < 10 ? '0' + modifiedMonth : modifiedMonth;
        modifiedDay = modifiedDay < 10 ? '0' + modifiedDay : modifiedDay;
        var formattedDateString = modifiedYear + '-' + modifiedMonth + '-' + modifiedDay;
        dateField.value = formattedDateString;
      }
      if (mode == "edit") {
        var editObj = collectionsDB["_toDoList"][editItem];
        var rawDate = editObj["dueDate"].split("/");
        var formattedDate = rawDate[2] + "-" + rawDate[0] + "-" + rawDate[1];
        dateField.value = formattedDate;
        taskTextField.value = editItem;
      }
    }

            <p id="loading-indicator-text">Loading camera</p>
          </div>
        </div>                               
        `
      mainLayout.innerHTML = createTakePictureHTML;
      createActionButtonBar({
        "cancel-take-picture-button": { "iconName": "cancel", "buttonText": "Cancel" },
        "snap-picture-button": { "iconName": "photo_camera", "buttonText": "Snap" },
        "switch-camera-button": { "iconName": "switch_camera", "buttonText": "Switch" }
      });
      const videoElement = document.querySelector('#camera-view');
      const cancelPictureButton = document.querySelector('#cancel-take-picture-button');
      const loadingIndicator = document.getElementById("loading-indicator-div");

      async function initializeCamera() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');
        const currentDevice = videoDevices.find(d => d.label.includes(currentStream?.getVideoTracks()[0].label)) || {};
        let nextDeviceId;
        if (currentDevice && currentDevice.deviceId) {
          const currentDeviceIndex = videoDevices.findIndex(d => d.deviceId === currentDevice.deviceId);
          nextDeviceId = videoDevices[(currentDeviceIndex + 1) % videoDevices.length].deviceId;
        } else {
          nextDeviceId = videoDevices[0].deviceId;
        }
        const constraints = {
          video: {
            deviceId: nextDeviceId,
            width: { ideal: 4096 },
            height: { ideal: 2160 }
          }
        };
        stopStreamedVideo(videoElement);
        navigator.mediaDevices.getUserMedia(constraints)
          .then(stream => {
            videoElement.srcObject = stream;
            currentStream = stream;
            videoElement.onloadedmetadata = () => {
              loadingIndicator.style.display = 'none';
            };
          })
          .catch(err => {
            console.error('Error accessing the camera:', err);
            loadingIndicator.style.display = 'none';
          });
      }


      cancelPictureButton.addEventListener("click", function () {
        deleteEditHeaderOverlay();
        const stream = videoElement.srcObject;
        stream.getTracks().forEach(track => track.stop());
        createAddImagePage("no");
      });
      const snapPictureButton = document.querySelector('#snap-picture-button');
      snapPictureButton.addEventListener("click", function () {
        deleteEditHeaderOverlay();
        const stream = videoElement.srcObject;
        const canvas = document.createElement('canvas');
        canvas.width = videoElement.videoWidth;
        canvas.height = videoElement.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
        stream.getTracks().forEach(track => track.stop());
        canvas.toBlob(blob => {
          currentImageData = blob;
          createAddImagePage("yes");
        });
      });
      const switchCameraButton = document.querySelector('#switch-camera-button');
      switchCameraButton.addEventListener("click", async function () {
        await initializeCamera();
      });
      await initializeCamera();
    }

      function keywordSearch(keyword, isFilter = false, filterKeyword = '') {
        let matches = [];
        keyword = keyword.toLowerCase();
        filterKeyword = filterKeyword.toLowerCase();

        function search(currentObject, currentPath) {
          for (let key in currentObject) {
            if (!currentObject.hasOwnProperty(key) || key === "data" || key === "type") continue;
            let newPath = currentPath.concat([key]);
            let keyValue = currentObject[key];
            let isKeyMatch = key.toLowerCase().includes(keyword);
            let isValueMatch = typeof keyValue === 'string' && keyValue.toLowerCase().includes(keyword);
            let isDataMatch = keyValue && typeof keyValue === 'object' && 'data' in keyValue && String(keyValue.data).toLowerCase().includes(keyword);
            if (isKeyMatch || isValueMatch || isDataMatch) {
              let pathString = newPath.join(" > ");
              if (!isFilter || (isFilter && pathString.toLowerCase().includes(filterKeyword))) {
                matches.push(pathString);
                var currentObj = getCurrentPath(newPath);

                    "path": "Calendar",

                  };

                  var resultsObj = {
                    "objType": "journal",
                    "itemName": newPath[newPath.length - 2],
                    "path": "Journal",
                    "realPath": newPath
                  };
                  searchResults[resultsObj["itemName"] + resultsObj["path"]] = resultsObj;
                }
              }
            }
            if (keyValue && typeof keyValue === 'object') {
              search(keyValue, newPath);
            }
          }
        }
        search(collectionsDB, []);
        return matches;
      }
      cancelSearchButton.addEventListener("click", function () {
        goHome();
      });

          createSearchPage();
          return;
        }
        const fieldValue = searchParamField.value;
        const filterValue = filterParamField.value;
        searchResults = {};
        searchIndex = 0;
        if (filterValue.length > 0) {
          keywordSearch(fieldValue, true, filterValue);
        }
        if (filterValue.length == 0) {
          keywordSearch(fieldValue);
        }
        for (var items in searchResults) {

    async function compressImage(imageData, quality = 0.85) {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(resolve, 'image/jpeg', quality);
        };

        img.onerror = reject;
        img.src = URL.createObjectURL(imageData);
      });
    }

    async function initializeCamera() {
      let videoElement = document.getElementById('camera-view');
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videoDevices = devices.filter(device => device.kind === 'videoinput');
      const currentDevice = videoDevices.find(d => d.label.includes(currentStream?.getVideoTracks()[0].label)) || {};
      let nextDeviceId;
      if (currentDevice && currentDevice.deviceId) {
        const currentDeviceIndex = videoDevices.findIndex(d => d.deviceId === currentDevice.deviceId);
        nextDeviceId = videoDevices[(currentDeviceIndex + 1) % videoDevices.length].deviceId;
      } else {
        nextDeviceId = videoDevices[0].deviceId;
      }
      const constraints = {
        video: {
          deviceId: nextDeviceId,
          width: { ideal: 4096 },
          height: { ideal: 2160 }
        }
      };
      stopStreamedVideo(videoElement);
      navigator.mediaDevices.getUserMedia(constraints)
        .then(stream => {
          videoElement.srcObject = stream;
          currentStream = stream;
        })
        .catch(err => {
          console.error('Error accessing the camera:', err);
        });
    }

    function generateRandomValues(byteLength) {
      return crypto.getRandomValues(new Uint8Array(byteLength));
    }

    async function deriveKey(password, salt, iterations) {
      const encoder = new TextEncoder();
      const passwordBuffer = encoder.encode(password);
      const importedKey = await crypto.subtle.importKey(
        "raw",
        passwordBuffer,
        { name: "PBKDF2" },
        false,
        ["deriveKey"]
      );
      return crypto.subtle.deriveKey(
        { "name": "PBKDF2", salt, iterations, "hash": "SHA-256" },
        importedKey,
        { "name": algorithmName, length: keyLen },
        true,
        ["encrypt", "decrypt"]
      );
    }

    async function encrypt(rawData, iterationOveride = undefined) {
      var iterations = configDB["pbdkf2Iters"];
      if (iterationOveride != undefined) {
        iterations = iterationOveride;
      }
      const salt = generateRandomValues(16);
      const iv = generateRandomValues(12);
      var key = await deriveKey(password, salt, iterations);
      let dataToEncrypt;
      if (typeof rawData === 'string') {
        dataToEncrypt = new TextEncoder().encode(rawData);
      } else if (rawData instanceof ArrayBuffer) {
        dataToEncrypt = rawData;
      } else {
        throw new Error("Unsupported data type for encryption");
      }
      const encryptedData = await crypto.subtle.encrypt(
        { name: algorithmName, iv },
        key,
        dataToEncrypt
      );
      const encryptedDataArray = new Uint8Array(encryptedData);
      const combinedData = new Uint8Array(salt.length + iv.length + encryptedDataArray.length);
      combinedData.set(salt, 0);
      combinedData.set(iv, salt.length);
      combinedData.set(encryptedDataArray, salt.length + iv.length);
      const blob = new Blob([combinedData], { type: 'application/octet-stream' });
      return blob;
    }

    async function decrypt(blob, outputType = "text", iterationOveride = undefined) {
      var iterations = configDB["pbdkf2Iters"];
      if (iterationOveride != undefined) {
        iterations = iterationOveride;
      }
      const arrayBuffer = await blob.arrayBuffer();
      const combinedData = new Uint8Array(arrayBuffer);
      const salt = combinedData.slice(0, 16);
      const iv = combinedData.slice(16, 28);
      const ciphertext = combinedData.slice(28);
      var key = await deriveKey(password, salt, iterations);
      try {
        const decryptedData = await crypto.subtle.decrypt(
          { name: algorithmName, iv },
          key,
          ciphertext
        );
        if (outputType === 'text') {
          return new TextDecoder().decode(new Uint8Array(decryptedData));
        } else if (outputType === 'binary') {
          return decryptedData;
        } else {
          throw new Error("Unsupported data type for decryption");
        }
      }
      catch (error) {
        console.error('Decryption failed:', error.message);
        return "Decryption failed";
      }
    }

    function arrayBufferToBase64(arrayBuffer) {
      return new Promise((resolve, reject) => {
        const blob = new Blob([arrayBuffer]);
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    function base64ToArrayBuffer(base64) {
      const binaryString = atob(base64.split(',')[1]);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return bytes.buffer;
    }

      var day = date.getDate();
      var year = date.getFullYear();
      return `${dayOfWeek}, ${month}/${day}/${year}`;
    }

    function timeToMinutes(timeString) {
      var parts = timeString.split(":");
      var hours = parseInt(parts[0], 10);
      var minutes = parseInt(parts[1], 10);
      return hours * 60 + minutes;
    }

    function convertTo12HourFormat(time24) {
      const [hours, minutes] = time24.split(':');
      const hrs = parseInt(hours, 10);
      const period = hrs >= 12 ? 'PM' : 'AM';
      const adjustedHours = hrs % 12 || 12;
      return `${adjustedHours.toString().padStart(2, '0')}:${minutes} ${period}`;
    }

    function checkDBDuplicates(itemName, itemPath) {
      var checkPath = getCurrentPath(itemPath);
      function generateNewItemName(baseName, number) {
        return `${baseName}(${number})`;
      }
      function keyExists(key) {
        return checkPath.hasOwnProperty(key);
      }
      if (keyExists(itemName)) {
        let counter = 1;
        let newItemName;
        do {
          newItemName = generateNewItemName(itemName, counter);
          counter++;
        } while (keyExists(newItemName));
        return newItemName;
      }
      return itemName;
    }

    function updateLastActivityTime() {
      lastActivityTime = Date.now();
    }

    async function checkSessionTimeout() {
      var currentTime = Date.now();
      var elapsed = currentTime - lastActivityTime;
      var rawDuration = parseInt(configDB["autoLogout"]);
      var duration = rawDuration * 60000;
      if (elapsed >= duration) {
        await logout();
      }
    }

    function resetSessionTimer() {
      if (isLoggedIn) {
        updateLastActivityTime();
      }
    }

    async function initApp() {
      await createLoginPage();
    }
    initApp();      
  </script>
</body>
